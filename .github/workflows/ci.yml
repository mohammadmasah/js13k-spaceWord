name: ci/cd

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npx mocha test/test.js

      - name: Functional tests
        run: |
          npm run cypress:test
          echo "Functional tests OK" >> $GITHUB_STEP_SUMMARY

      - name: Lint
        run: |
          npm run lint:check
          echo "Lint check successful" >> $GITHUB_STEP_SUMMARY
